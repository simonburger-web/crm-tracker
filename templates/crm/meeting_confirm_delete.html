{% extends "base.html" %}

{% block title %}Delete Meeting – CRM Tracker{% endblock %}
{% block page_title %}Delete Meeting{% endblock %}

{% block content %}
<div class="max-w-md bg-white rounded-lg border border-gray-200 p-6">
  <p class="text-gray-700 mb-6">Are you sure you want to delete <strong>{{ meeting.title }}</strong> with {{ meeting.contact.name }}?</p>
  <form method="post" class="flex gap-3">
    {% csrf_token %}
    <button type="submit" class="btn-danger">Delete</button>
    <a href="{% url 'calendar' %}" class="btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
