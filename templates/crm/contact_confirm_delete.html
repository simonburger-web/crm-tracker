{% extends "base.html" %}

{% block title %}Delete Lead — CRM Tracker{% endblock %}
{% block page_title %}Delete Lead{% endblock %}

{% block content %}
<div class="max-w-md">
  <div class="bg-white rounded-xl border border-gray-200 p-6">
    <p class="text-sm text-gray-700 mb-6">
      Are you sure you want to delete <strong>{{ contact.name }}</strong>? This will also delete all their closed deals and notes.
    </p>
    <form method="post" class="flex gap-3">
      {% csrf_token %}
      <button type="submit" class="btn-danger">Delete</button>
      <a href="{% url 'contact_detail' contact.pk %}" class="btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
