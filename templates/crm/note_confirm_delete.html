{% extends "base.html" %}

{% block title %}Delete Note — CRM Tracker{% endblock %}
{% block page_title %}Delete Note{% endblock %}

{% block content %}
<div class="max-w-md">
  <div class="bg-white rounded-xl border border-gray-200 p-6">
    <p class="text-sm text-gray-700 mb-2">Delete this note?</p>
    <blockquote class="border-l-4 border-gray-200 pl-4 text-sm text-gray-600 italic mb-6">{{ note.body|truncatewords:30 }}</blockquote>
    <form method="post" class="flex gap-3">
      {% csrf_token %}
      <button type="submit" class="btn-danger">Delete</button>
      <a href="javascript:history.back()" class="btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
