<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CRM Tracker{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .form-input {
      @apply block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500;
    }
    .btn-primary {
      @apply inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none;
    }
    .btn-secondary {
      @apply inline-flex items-center rounded-md bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm border border-gray-300 hover:bg-gray-50 focus:outline-none;
    }
    .btn-danger {
      @apply inline-flex items-center rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-red-700 focus:outline-none;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-64 bg-indigo-900 text-white flex flex-col flex-shrink-0">
    <div class="px-6 py-5 border-b border-indigo-800">
      <span class="text-xl font-bold tracking-tight">CRM Tracker</span>
    </div>
    <nav class="flex-1 px-4 py-6 space-y-1">
      <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium {% if request.resolver_match.url_name == 'dashboard' %}bg-indigo-700 text-white{% else %}text-indigo-100 hover:bg-indigo-800{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="{% url 'us_leads' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium {% if request.resolver_match.url_name == 'us_leads' %}bg-indigo-700 text-white{% else %}text-indigo-100 hover:bg-indigo-800{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        US Leads
      </a>
      <a href="{% url 'sa_leads' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium {% if request.resolver_match.url_name == 'sa_leads' %}bg-indigo-700 text-white{% else %}text-indigo-100 hover:bg-indigo-800{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        SA Leads
      </a>
      <a href="{% url 'inactive_leads' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium {% if request.resolver_match.url_name == 'inactive_leads' %}bg-indigo-700 text-white{% else %}text-indigo-100 hover:bg-indigo-800{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
        Inactive Leads
      </a>
      <a href="{% url 'deal_list' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium {% if 'deal' in request.resolver_match.url_name %}bg-indigo-700 text-white{% else %}text-indigo-100 hover:bg-indigo-800{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Closed Deals
      </a>
      <a href="{% url 'calendar' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium {% if 'calendar' in request.resolver_match.url_name or 'meeting' in request.resolver_match.url_name %}bg-indigo-700 text-white{% else %}text-indigo-100 hover:bg-indigo-800{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Calendar
      </a>
      <a href="{% url 'leads_generator' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium {% if request.resolver_match.url_name == 'leads_generator' %}bg-indigo-700 text-white{% else %}text-indigo-100 hover:bg-indigo-800{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5h2m-1 0v14m-7-7h14"/></svg>
        Leads Generator
      </a>
    </nav>
    <div class="px-6 py-4 border-t border-indigo-800 text-xs text-indigo-400">
      CRM Tracker v1.0
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col min-w-0">
    <header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between">
      <h1 class="text-xl font-semibold text-gray-900">{% block page_title %}{% endblock %}</h1>
      <div class="flex gap-3">{% block header_actions %}{% endblock %}</div>
    </header>
    <main class="flex-1 px-8 py-6">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

</body>
</html>
